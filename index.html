function renderSourceChart(canvasId, weeks) {
  destroyChart('wk_srcInsight');
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const srcs      = settings.transferSources || [];
  const wkLabels  = weeks.map(w => weekLabel(w.weekStart));

  // Per-source data arrays
  const sourceDatasets = srcs.map((src, i) => ({
    label: src,
    color: SOURCE_PALETTE[i % SOURCE_PALETTE.length],
    data:  weeks.map(w => (w.sources ? (Number(w.sources[src]) || 0) : 0)),
  }));

  // "Untagged" for backward-compat entries that only have a total (no sources object)
  const untaggedData = weeks.map(w => (!w.sources || !Object.keys(w.sources).length) ? (Number(w.transfers) || 0) : 0);
  const hasUntagged  = untaggedData.some(v => v > 0);

  const commonOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { position: 'bottom', labels: { font:{size:10}, boxWidth:12, padding:10 } },
      tooltip: { mode:'index', intersect:false },
    },
  };

  if (_srcChartView === 'stacked') {
    const datasets = [
      ...sourceDatasets.map(({label, color, data}) => ({
        label, data,
        backgroundColor: color,
        stack: 'transfers',
        borderRadius: 2,
        borderWidth: 0,
      })),
      ...(hasUntagged ? [{
        label: 'Untagged', data: untaggedData,
        backgroundColor: UNTAGGED_COLOR,
        stack: 'transfers',
        borderRadius: 2, borderWidth: 0,
      }] : []),
    ];
    charts.wk_srcInsight = new Chart(canvas, {
      type: 'bar',
      data: { labels: wkLabels, datasets },
      options: {
        ...commonOpts,
        scales: {
          x: { grid:{display:false}, ticks:{font:{size:10}}, stacked:true },
          y: { beginAtZero:true, stacked:true, ticks:{precision:0, font:{size:10}} },
        },
      },
    });
  } else {
    const datasets = [
      ...sourceDatasets.map(({label, color, data}) => ({
        label, data,
        borderColor: color,
        backgroundColor: color + '22',
        pointRadius: 3, fill: false, tension: 0.3,
      })),
      ...(hasUntagged ? [{
        label: 'Untagged', data: untaggedData,
        borderColor: UNTAGGED_COLOR,
        backgroundColor: UNTAGGED_COLOR + '22',
        pointRadius: 3, fill: false, tension: 0.3,
      }] : []),
    ];
    charts.wk_srcInsight = new Chart(canvas, {
      type: 'line',
      data: { labels: wkLabels, datasets },
      options: {
        ...commonOpts,
        scales: {
          x: { grid:{display:false}, ticks:{font:{size:10}} },
          y: { beginAtZero:true, ticks:{precision:0, font:{size:10}} },
        },
      },
    });
  }
}

function renderWeeklyChart(canvasId, weeks, metric, label, keyPrefix = 'wk', opts = {}) {
  destroyChart(keyPrefix + '_' + metric);
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const money    = !!opts.money;     // format as currency
  const noTarget = !!opts.noTarget;  // metric has no weekly target line

  const labels  = weeks.map(w => weekLabel(w.weekStart));
  const values  = weeks.map(w => Number(w[metric]) || 0);
  const targets = noTarget ? [] : weeks.map(w => getTargetForWeek(metric, w.weekStart));

  // Red = negative | Green = at/above target | Blue = positive but below target (or no target)
  const bgColors = values.map((v, i) => {
    if (v < 0)                                          return 'rgba(229,62,62,.85)';  // red — negative
    if (!noTarget && targets[i] > 0 && v >= targets[i]) return 'rgba(29,158,117,.85)'; // teal/green — hit
    return 'rgba(59,100,168,.78)';                                                     // blue — below/no target
  });

  const datasets = [{ label, data: values, backgroundColor: bgColors, borderRadius: 4, order: 1 }];
  if (!noTarget) {
    datasets.push({
      label: 'Target', type: 'line', data: targets,
      borderColor: '#BA7517', borderDash: [6, 4], borderWidth: 2,
      pointRadius: 0, fill: false, tension: 0, order: 0,
    });
  }

  const fmtVal  = money ? (v => fmt(v)) : (v => v);
  const fmtTick = money
    ? (v => '$' + (Math.abs(v) >= 1000 ? (v/1000).toFixed(0) + 'k' : v))
    : (v => v);

  charts[keyPrefix + '_' + metric] = new Chart(canvas, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtVal(ctx.raw)}` } },
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 } } },
        y: { beginAtZero: true, ticks: { precision: 0, font: { size: 10 }, callback: fmtTick } },
      },
    },
  });
}

let _weekEditId = null;  // null = new entry

function openWeekModal(id) {
  _weekEditId = id || null;

  renderWeekModal();
}
function closeWeekModal() {
  document.getElementById('weekModalOverlay').style.display = 'none';
  _weekEditId = null;
}
function weekOverlayClick(e) {
  if (e.target === document.getElementById('weekModalOverlay')) closeWeekModal();
}

function renderWeekModal() {
  const existing    = _weekEditId ? weeklyEntries.find(w => w.id === _weekEditId) : null;
  const defaultDate = existing ? existing.weekStart : getCurrentMondayISO();
  const now  = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const mT  = monthlyTotal('transfers',    y, m);
  const mBP = monthlyTotal('blisterPacks', y, m);
  const mRx = monthlyTotal('rxCount',      y, m);
  const wTT  = settings.transfersWeeklyTarget    || 0;
  const wBPT = settings.blisterPacksWeeklyTarget  || 0;
  const wRxT = settings.rxWeeklyTarget            || 0;

  function mtdCell(lbl, val, tgt) {
    const p = tgt > 0 ? Math.min(100, (val / tgt) * 100) : 0;
    const color = p >= 100 ? 'var(--teal)' : 'var(--navy)';
    return `<div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:.65rem;color:var(--light);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">${lbl}</div>
      <div style="font-size:1.15rem;font-weight:800;color:${color}">${val}</div>
      <div style="font-size:.62rem;color:var(--light)">of ${tgt} (${p.toFixed(0)}%)</div>
    </div>`;
  }

  document.getElementById('weekModalBox').innerHTML = `
    <div class="modal-head">
      <h2>${existing ? 'Edit Week' : 'Add Week'}</h2>
    </div>
    <div class="modal-body">

      <div class="form-row">
        <label>Week Starting (select any day — auto-snaps to Monday)</label>
        <input type="date" id="wkDate" value="${defaultDate}" onchange="wkSnapMonday()">
        <div class="hint" id="wkDateHint" style="color:var(--teal)"></div>
      </div>

      <hr class="section-divider">

      <div class="form-row">
        <label>Transfers <span class="text-xs text-light">— patients transferred in this week, by source</span></label>
        <div class="wk-src-grid">
          ${(settings.transferSources||[]).map((src,i) => `
            <div>
              <div style="font-size:.65rem;color:var(--light);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em">${esc(src)}</div>
              <input type="number" id="wkSrc_${i}" min="0" step="1"
                value="${existing?.sources?.[src] ?? 0}" placeholder="0"
                oninput="calcTransferTotal()">
            </div>`).join('')}
        </div>
        <div style="margin-top:8px;padding:7px 10px;background:var(--bg);border-radius:6px;display:flex;align-items:center;gap:10px">
          <span style="font-size:.68rem;color:var(--light);text-transform:uppercase;letter-spacing:.05em">Total Transfers</span>
          <span id="wkTransfersTotal" style="font-size:1.05rem;font-weight:800;color:var(--navy)">${existing ? (existing.transfers||0) : 0}</span>
        </div>
      </div>
      <div class="form-row">
        <label>Blister Packs <span class="text-xs text-light">— packs added (negative = lost)</span></label>
        <input type="number" id="wkBP" step="1" value="${existing ? existing.blisterPacks : ''}" placeholder="0">
      </div>
      <div class="form-row">
        <label>Rx Count <span class="text-xs text-light">— prescriptions filled this week</span></label>
        <input type="number" id="wkRx" min="0" step="1" value="${existing ? existing.rxCount : ''}" placeholder="0">
      </div>
      <div class="form-row">
        <label>Fee + Markup <span class="text-xs text-light">— weekly dispensing fee + markup ($)</span></label>
        <div class="input-prefix"><span>$</span>
          <input type="number" id="wkFM" min="0" step="0.01" value="${existing && existing.feeMarkup != null ? existing.feeMarkup : ''}" placeholder="0">
        </div>
      </div>
      <div class="form-row">
        <label>What drove results this week <span class="text-xs text-light">— optional, shown on EHC page</span></label>
        <textarea id="wkNote" rows="3" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.88rem;font-family:inherit;resize:vertical;color:var(--text)" placeholder="e.g. Remit study referrals — 4 transfers from study follow-ups.">${existing ? (existing.weeklyNote || '') : ''}</textarea>
      </div>

      <hr class="section-divider">
      <div style="font-size:.72rem;font-weight:700;color:var(--light);letter-spacing:.06em;margin-bottom:10px">
        MONTH-TO-DATE — ${now.toLocaleString('en-CA',{month:'long',year:'numeric'})}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${mtdCell('Transfers', mT, Math.round(wTT*4.33))}
        ${mtdCell('Blister Packs', mBP, Math.round(wBPT*4.33))}

function wkSnapMonday() {
  const inp = document.getElementById('wkDate');
  if (!inp || !inp.value) return;
  inp.value = getMondayISO(inp.value);
  const hint = document.getElementById('wkDateHint');
  if (hint) hint.textContent = 'Week: ' + weekLabel(inp.value);
}

function calcTransferTotal() {
  const srcs  = settings.transferSources || [];
  const total = srcs.reduce((sum, _, i) => sum + (parseInt(document.getElementById('wkSrc_' + i)?.value) || 0), 0);
  const el    = document.getElementById('wkTransfersTotal');
  if (el) el.textContent = total;
}

function saveWeekEntry() {
  const dateVal      = document.getElementById('wkDate')?.value;
  const blisterPacks = parseInt(document.getElementById('wkBP')?.value)  || 0;
  const rxCount      = parseInt(document.getElementById('wkRx')?.value)   || 0;
  const feeMarkup    = parseFloat(document.getElementById('wkFM')?.value) || 0;
  const weeklyNote   = (document.getElementById('wkNote')?.value || '').trim();

  // Collect per-source transfer counts
  const srcs = settings.transferSources || [];
  const sourcesData = {};
  let totalTransfers = 0;
  srcs.forEach((src, i) => {
    const v = parseInt(document.getElementById('wkSrc_' + i)?.value) || 0;
    sourcesData[src] = v;
    totalTransfers += v;
  });

  if (!dateVal) { alert('Please select a date.'); return; }
  const weekStart = getMondayISO(dateVal);

  // Duplicate check (skip self when editing)
  const dupIdx = weeklyEntries.findIndex(
    w => w.weekStart === weekStart && w.id !== _weekEditId
  );
  if (dupIdx >= 0) {
    if (!confirm(`A record for the week of ${weekLabel(weekStart)} already exists. Replace it?`)) return;
    weeklyEntries.splice(dupIdx, 1);
  }

  const record = {
    id:           _weekEditId || ('w' + Date.now()),
    weekStart,
    transfers:    totalTransfers,  // backward compat — used by existing charts and rolling avg
    sources:      sourcesData,     // per-source breakdown for insight chart
    blisterPacks,
    rxCount,
    feeMarkup,
    weeklyNote,
    enteredAt:    new Date().toISOString(),
  };

  if (_weekEditId) {
    const idx = weeklyEntries.findIndex(w => w.id === _weekEditId);
    if (idx >= 0) weeklyEntries[idx] = record; else weeklyEntries.push(record);
  } else {
    weeklyEntries.push(record);
  }

  saveWeeklyEntries();
  closeWeekModal();

  // Check celebrations
  const tTgt  = getTargetForWeek('transfers',    weekStart);
  const bpTgt = getTargetForWeek('blisterPacks', weekStart);
  const rxTgt = getTargetForWeek('rxCount',      weekStart);
  const hits  = [];
  if (tTgt  > 0 && totalTransfers >= tTgt)  hits.push(`Transfers hit! (${totalTransfers} / ${tTgt} target)`);
  if (bpTgt > 0 && blisterPacks >= bpTgt) hits.push(`Blister Packs hit! (${blisterPacks} / ${bpTgt} target)`);
  if (rxTgt > 0 && rxCount      >= rxTgt) hits.push(`Rx Count hit! (${rxCount} / ${rxTgt} target)`);
  if (hits.length) showCelebration(hits);

  navigate('weekly');
}

async function deleteWeekEntry(id) {
  if (!confirm('Delete this week\'s entry?')) return;
  weeklyEntries = weeklyEntries.filter(w => w.id !== id);
  saveWeeklyEntries();
  navigate('weekly');
}

function friendlyAuthError(code) {
  const map = {
    'auth/user-not-found':      'No account found for that email.',
    'auth/wrong-password':      'Incorrect password.',
    'auth/invalid-email':       'Invalid email address.',
    'auth/too-many-requests':   'Too many attempts. Please wait a moment and try again.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'auth/invalid-credential':  'Incorrect email or password.',
  };
  return map[code] || code;
}

function setAuthLoading(on) {
  document.getElementById('authLoading').style.display = on ? 'flex' : 'none';
  document.getElementById('signInBtn').style.display   = on ? 'none' : 'flex';
  // Also hide/show email form buttons
  const emailBtn = document.getElementById('emailSignInBtn');
  if (emailBtn) emailBtn.style.display = on ? 'none' : 'block';
}

function doSignIn() {
  document.getElementById('authError').textContent = '';
  setAuthLoading(true);
  auth.signInWithRedirect(provider).catch(err => {
    document.getElementById('authError').textContent = 'Google sign-in failed: ' + err.message;
    setAuthLoading(false);
  });
}

async function doEmailSignIn() {
  const email    = (document.getElementById('authEmail').value    || '').trim();
  const password = (document.getElementById('authPassword').value || '');
  if (!email || !password) {
    document.getElementById('authError').textContent = 'Enter your email and password.';
    return;
  }
  document.getElementById('authError').textContent = '';
  setAuthLoading(true);
  try {
    await auth.signInWithEmailAndPassword(email, password);
    // onAuthStateChanged handles the rest
  } catch (err) {
    document.getElementById('authError').textContent = friendlyAuthError(err.code);
    setAuthLoading(false);
  }
}

async function doForgotPassword() {
  const email = (document.getElementById('authEmail').value || '').trim();
  if (!email) {
    document.getElementById('authError').textContent = 'Enter your email address above first.';
    return;
  }
  try {
    await auth.sendPasswordResetEmail(email);
    document.getElementById('authError').style.color = '#86efac';
    document.getElementById('authError').textContent = '✓ Password reset email sent — check your inbox.';
  } catch (err) {
    document.getElementById('authError').style.color = '#fca5a5';
    document.getElementById('authError').textContent = 'Could not send reset email: ' + friendlyAuthError(err.code);
  }
}

async function doChangePassword() {
  const pw1 = document.getElementById('pwNew').value;
  const pw2 = document.getElementById('pwConfirm').value;
  const errEl = document.getElementById('pwChangeError');
  errEl.textContent = '';
  if (pw1.length < 8)  { errEl.textContent = 'Password must be at least 8 characters.'; return; }
  if (pw1 !== pw2)     { errEl.textContent = 'Passwords do not match.'; return; }
  try {
    await auth.currentUser.updatePassword(pw1);
    // Clear the mustChangePassword flag in Firestore
    const email = auth.currentUser.email;
    await db.collection(FS_USERS).doc(email).update({ mustChangePassword: false }).catch(() => {});
    document.getElementById('pwChangeOverlay').style.display = 'none';
  } catch (err) {
    errEl.textContent = 'Could not update password: ' + (err.message || err.code);
  }
}

function doSignOut() {
  auth.signOut();
}

async function bootstrapUsersIfNeeded() {

  const opts = { merge: true };
  // Fetch all default-user docs in parallel to see which are missing
  const snapshots = await Promise.all(DEFAULT_USERS.map(u => col.doc(u.email).get()));

  const form = document.querySelector(`[data-edit-email="${email}"]`);
  if (!form) return;
  const checked = [...form.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
  if (!checked.length) { alert('User must have at least one page.'); return; }
  await db.collection(FS_USERS).doc(email).update({ pages: checked });
  await loadAdminUsers();
}

async function removeUser(email) {
  if (email === OWNER_EMAIL) return;
  if (!confirm(`Remove ${email}?\n\nThey will lose access immediately on next page load.`)) return;
  await db.collection(FS_USERS).doc(email).delete();
  await loadAdminUsers();
}

function openAddUserForm() {
  const el = document.getElementById('addUserForm');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function sendResetEmail(email) {
  try {
    await auth.sendPasswordResetEmail(email);
    alert(`✓ Password reset email sent to ${email}`);
  } catch (err) {
    alert('Could not send reset email: ' + (err.message || err.code));
  }
}

async function saveNewUser() {
  const emailEl      = document.getElementById('newUserEmail');
  const roleEl       = document.getElementById('newUserRole');
  const authMethodEl = document.getElementById('newUserAuthMethod');
  const email      = (emailEl.value || '').trim().toLowerCase();
  const role       = roleEl ? roleEl.value : 'Custom';
  const authMethod = authMethodEl ? authMethodEl.value : 'google';
  if (!email || !email.includes('@')) { alert('Enter a valid email address.'); return; }
  if (_adminUsers.find(u => u.email === email)) { alert('This user already exists.'); return; }
  const checked = [...document.querySelectorAll('#newUserPageChecks input:checked')].map(c => c.value);
  if (!checked.length) { alert('Select at least one page.'); return; }
  const doc = { email, pages: checked, role, authMethod };
  if (authMethod === 'email') doc.mustChangePassword = true;
  await db.collection(FS_USERS).doc(email).set(doc);
  // Offer to send welcome/reset email for email-type users
  if (authMethod === 'email') {
    if (confirm(`User saved. Send a password setup email to ${email} now?\n\n(The Firebase Auth account must already be created in Firebase Console first.)`)) {
      await sendResetEmail(email);
    }
  }
  emailEl.value = '';
  document.querySelectorAll('#newUserPageChecks input').forEach(c => c.checked = false);
  document.getElementById('addUserForm').style.display = 'none';
  await loadAdminUsers();
}

// ================================================================
// INIT (auth-gated)
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  // Show gate immediately; auth listener will hide it once signed in
  document.getElementById('authGate').style.display = 'flex';

  // Handle the result of signInWithRedirect (fires after Google sends user back)
  auth.getRedirectResult().then(result => {
    if (result && result.user) {
      console.log('[Auth] Redirect sign-in complete:', result.user.email);
      // onAuthStateChanged will fire and handle the rest
    }
  }).catch(err => {
    if (err && err.code !== 'auth/no-current-user') {
      document.getElementById('authError').textContent = 'Google sign-in failed: ' + err.message;
    }
  });

  // Helper: race a promise against a timeout
  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms)),
    ]);
  }

  function setLoadMsg(msg) {
    const el = document.getElementById('authLoadingMsg');
    if (el) el.textContent = msg;
  }

  auth.onAuthStateChanged(async user => {
    if (!user) {
      userRecord = null;
      document.getElementById('mainNav').innerHTML            = '';
      document.getElementById('authGate').style.display      = 'flex';
      document.getElementById('signInBtn').style.display     = 'flex';
      document.getElementById('authLoading').style.display   = 'none';
      document.getElementById('signOutBtn').style.display    = 'none';
      document.getElementById('userDisplay').textContent     = '';
      document.getElementById('authError').textContent       = '';
      document.getElementById('authError').style.color       = '#fca5a5'; // reset to red
      document.getElementById('pwChangeOverlay').style.display = 'none';
      return;
    }

    document.getElementById('authGate').style.display      = 'flex';
    document.getElementById('authLoading').style.display   = 'flex';
    document.getElementById('signInBtn').style.display     = 'none';
    document.getElementById('authError').textContent       = '';
    setLoadMsg('Checking access…');
    console.log('[Auth v4] Signed in as:', user.email);

    try {
      // ── TRUSTED EMAILS: never block on Firestore ─────────────────
      if (TRUSTED_EMAILS.includes(user.email)) {
        const role = user.email === OWNER_EMAIL ? 'Owner' : 'Full Access';
        console.log('[Auth] Trusted email — full access granted, role:', role);
        userRecord = { email: user.email, pages: [...ALL_PAGES], role };

        // Owner: always write their own user doc before loadState runs.
        // This is idempotent (merge:true) and guarantees the doc exists
        // so Firestore rules can pass the exists() check on pharmasave reads.
        // Background-seed other default users after the doc is confirmed.
        if (user.email === OWNER_EMAIL) {
          setLoadMsg('Setting up access…');
          try {
            await withTimeout(
              db.collection(FS_USERS).doc(OWNER_EMAIL).set(
                { email: OWNER_EMAIL, pages: [...ALL_PAGES], role: 'Owner' },
                { merge: true }
              ), 6000
            );
            console.log('[Auth] Owner doc written');
            // Seed other default users in background (non-blocking)
            bootstrapUsersIfNeeded().catch(e => console.warn('[Bootstrap]', e.message));
          } catch (bErr) {
            console.warn('[Auth] Owner doc write failed/timed out:', bErr.message);
            // Continue — if old permissive rules are in place, loadState may still work
          }
        }

        // Load app data
        setLoadMsg('Loading data…');
        console.log('[Auth] Calling loadState()…');
        try {
          await withTimeout(loadState(), 8000);
          console.log('[Auth] loadState() succeeded');
        } catch (fsErr) {
          console.error('[Auth] loadState() failed:', fsErr.message, fsErr.code);
          // Show the real error instead of silently using defaults
          document.getElementById('authError').textContent =
            'Data load failed: ' + (fsErr.code || fsErr.message) +
            ' — check browser console for details.';
          document.getElementById('signInBtn').style.display   = 'flex';
          document.getElementById('authLoading').style.display = 'none';
          return;
        }

      // ── NON-OWNER: must exist in users/ collection ────────────────
      } else {
        setLoadMsg('Checking permissions…');
        console.log('[Auth] Fetching user record…');
        let rec = null;
        try {
          rec = await withTimeout(fetchUserRecord(user.email), 8000);
        } catch (e) {
          console.error('[Auth] fetchUserRecord failed:', e.message);
          throw new Error('Could not reach the permissions database. Check your connection and try again.');
        }

        if (!rec) {
          await auth.signOut();
          document.getElementById('authError').textContent     = 'Access denied. Contact the pharmacy owner to request access.';
          document.getElementById('signInBtn').style.display   = 'flex';
          document.getElementById('authLoading').style.display = 'none';
          return;
        }
        userRecord = rec;
        console.log('[Auth] User record loaded:', rec.role, rec.pages);

        setLoadMsg('Loading data…');
        await withTimeout(loadState(), 8000);
        console.log('[Auth] loadState() succeeded');
      }

    } catch (err) {
      console.error('[Auth] Fatal error:', err);
      document.getElementById('authError').textContent     = 'Error: ' + err.message;
      document.getElementById('signInBtn').style.display   = 'flex';
      document.getElementById('authLoading').style.display = 'none';
      return;
    }

    // ── Show the app ──────────────────────────────────────────────
    document.getElementById('userDisplay').textContent  = user.displayName || user.email;
    document.getElementById('signOutBtn').style.display = 'block';
    renderNav();
    document.getElementById('authGate').style.display = 'none';
    const firstPage = PAGE_MAP.find(p => userRecord.pages.includes(p.name));
    navigate(firstPage ? firstPage.id : 'dashboard');
    console.log('[Auth] App ready. Page:', firstPage ? firstPage.id : 'dashboard');

    // Prompt email/password users to change their temporary password
    const isEmailUser = user.providerData.some(p => p.providerId === 'password');
    if (isEmailUser && userRecord.mustChangePassword) {
      document.getElementById('pwNew').value     = '';
      document.getElementById('pwConfirm').value = '';
      document.getElementById('pwChangeError').textContent = '';
      document.getElementById('pwChangeOverlay').style.display = 'flex';
    }
  });
});
</script>

</html>

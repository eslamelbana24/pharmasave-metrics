let _weekEditId = null;  // null = new entry

function openWeekModal(id) {
  _weekEditId = id || null;
  document.getElementById('weekModalOverlay').style.display = 'flex';
  renderWeekModal();
}
function closeWeekModal() {
  document.getElementById('weekModalOverlay').style.display = 'none';
  _weekEditId = null;
}
function weekOverlayClick(e) {
  if (e.target === document.getElementById('weekModalOverlay')) closeWeekModal();
}

function renderWeekModal() {
  const existing    = _weekEditId ? weeklyEntries.find(w => w.id === _weekEditId) : null;
  const defaultDate = existing ? existing.weekStart : getCurrentMondayISO();
  const now  = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const mT  = monthlyTotal('transfers',    y, m);
  const mBP = monthlyTotal('blisterPacks', y, m);
  const mRx = monthlyTotal('rxCount',      y, m);
  const wTT  = settings.transfersWeeklyTarget    || 0;
  const wBPT = settings.blisterPacksWeeklyTarget  || 0;
  const wRxT = settings.rxWeeklyTarget            || 0;

  function mtdCell(lbl, val, tgt) {
    const p = tgt > 0 ? Math.min(100, (val / tgt) * 100) : 0;
    const color = p >= 100 ? 'var(--teal)' : 'var(--navy)';
    return `<div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:.65rem;color:var(--light);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em">${lbl}</div>
      <div style="font-size:1.15rem;font-weight:800;color:${color}">${val}</div>
      <div style="font-size:.62rem;color:var(--light)">of ${tgt} (${p.toFixed(0)}%)</div>
    </div>`;
  }

  document.getElementById('weekModalBox').innerHTML = `
    <div class="modal-head">
      <h2>${existing ? 'Edit Week' : 'Add Week'}</h2>
    </div>
    <div class="modal-body">

      <div class="form-row">
        <label>Week Starting (select any day — auto-snaps to Monday)</label>
        <input type="date" id="wkDate" value="${defaultDate}" onchange="wkSnapMonday()">
        <div class="hint" id="wkDateHint" style="color:var(--teal)"></div>
      </div>

      <hr class="section-divider">

      <div class="form-row">
        <label>Transfers <span class="text-xs text-light">— patients transferred in this week, by source</span></label>
        <div class="wk-src-grid">
          ${(settings.transferSources||[]).map((src,i) => `
            <div>
              <div style="font-size:.65rem;color:var(--light);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em">${esc(src)}</div>
              <input type="number" id="wkSrc_${i}" min="0" step="1"
                value="${existing?.sources?.[src] ?? 0}" placeholder="0"
                oninput="calcTransferTotal()">
            </div>`).join('')}
        </div>
        <div style="margin-top:8px;padding:7px 10px;background:var(--bg);border-radius:6px;display:flex;align-items:center;gap:10px">
          <span style="font-size:.68rem;color:var(--light);text-transform:uppercase;letter-spacing:.05em">Total Transfers</span>
          <span id="wkTransfersTotal" style="font-size:1.05rem;font-weight:800;color:var(--navy)">${existing ? (existing.transfers||0) : 0}</span>
        </div>
      </div>
      <div class="form-row">
        <label>Blister Packs <span class="text-xs text-light">— packs added (negative = lost)</span></label>
        <input type="number" id="wkBP" step="1" value="${existing ? existing.blisterPacks : ''}" placeholder="0">
      </div>
      <div class="form-row">
        <label>Rx Count <span class="text-xs text-light">— prescriptions filled this week</span></label>
        <input type="number" id="wkRx" min="0" step="1" value="${existing ? existing.rxCount : ''}" placeholder="0">
      </div>
      <div class="form-row">
        <label>What drove results this week <span class="text-xs text-light">— optional, shown on EHC page</span></label>
        <textarea id="wkNote" rows="3" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:.88rem;font-family:inherit;resize:vertical;color:var(--text)" placeholder="e.g. Remit study referrals — 4 transfers from study follow-ups.">${existing ? (existing.weeklyNote || '') : ''}</textarea>
      </div>

      <hr class="section-divider">
      <div style="font-size:.72rem;font-weight:700;color:var(--light);letter-spacing:.06em;margin-bottom:10px">
        MONTH-TO-DATE — ${now.toLocaleString('en-CA',{month:'long',year:'numeric'})}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${mtdCell('Transfers', mT, Math.round(wTT*4.33))}
        ${mtdCell('Blister Packs', mBP, Math.round(wBPT*4.33))}
        ${mtdCell('Rx Count', mRx, Math.round(wRxT*4.33))}
      </div>

    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeWeekModal()">Cancel</button>
      <button class="btn btn-success" onclick="saveWeekEntry()">${existing ? 'Save Changes' : 'Add Week'}</button>
    </div>
  `;
  wkSnapMonday();
}

function wkSnapMonday() {
  const inp = document.getElementById('wkDate');
  if (!inp || !inp.value) return;
  inp.value = getMondayISO(inp.value);
  const hint = document.getElementById('wkDateHint');
  if (hint) hint.textContent = 'Week: ' + weekLabel(inp.value);
}

function calcTransferTotal() {
  const srcs  = settings.transferSources || [];
  const total = srcs.reduce((sum, _, i) => sum + (parseInt(document.getElementById('wkSrc_' + i)?.value) || 0), 0);
  const el    = document.getElementById('wkTransfersTotal');
  if (el) el.textContent = total;
}

function saveWeekEntry() {
  const dateVal      = document.getElementById('wkDate')?.value;
  const blisterPacks = parseInt(document.getElementById('wkBP')?.value)  || 0;
  const rxCount      = parseInt(document.getElementById('wkRx')?.value)   || 0;
  const weeklyNote   = (document.getElementById('wkNote')?.value || '').trim();

  // Collect per-source transfer counts
  const srcs = settings.transferSources || [];
  const sourcesData = {};
  let totalTransfers = 0;
  srcs.forEach((src, i) => {
    const v = parseInt(document.getElementById('wkSrc_' + i)?.value) || 0;
    sourcesData[src] = v;
    totalTransfers += v;
  });

  if (!dateVal) { alert('Please select a date.'); return; }
  const weekStart = getMondayISO(dateVal);

  // Duplicate check (skip self when editing)
  const dupIdx = weeklyEntries.findIndex(
    w => w.weekStart === weekStart && w.id !== _weekEditId
  );
  if (dupIdx >= 0) {
    if (!confirm(`A record for the week of ${weekLabel(weekStart)} already exists. Replace it?`)) return;
    weeklyEntries.splice(dupIdx, 1);
  }

  const record = {
    id:           _weekEditId || ('w' + Date.now()),
    weekStart,
    transfers:    totalTransfers,  // backward compat — used by existing charts and rolling avg
    sources:      sourcesData,     // per-source breakdown for insight chart
    blisterPacks,
    rxCount,
    weeklyNote,
    enteredAt:    new Date().toISOString(),
  };

  if (_weekEditId) {
    const idx = weeklyEntries.findIndex(w => w.id === _weekEditId);
    if (idx >= 0) weeklyEntries[idx] = record; else weeklyEntries.push(record);
  } else {
    weeklyEntries.push(record);
  }

  saveWeeklyEntries();
  closeWeekModal();

  // Check celebrations
  const tTgt  = getTargetForWeek('transfers',    weekStart);
  const bpTgt = getTargetForWeek('blisterPacks', weekStart);
  const rxTgt = getTargetForWeek('rxCount',      weekStart);
  const hits  = [];
  if (tTgt  > 0 && totalTransfers >= tTgt)  hits.push(`Transfers hit! (${totalTransfers} / ${tTgt} target)`);
  if (bpTgt > 0 && blisterPacks >= bpTgt) hits.push(`Blister Packs hit! (${blisterPacks} / ${bpTgt} target)`);
  if (rxTgt > 0 && rxCount      >= rxTgt) hits.push(`Rx Count hit! (${rxCount} / ${rxTgt} target)`);
  if (hits.length) showCelebration(hits);

  navigate('weekly');
}

async function deleteWeekEntry(id) {
  if (!confirm('Delete this week\'s entry?')) return;
  weeklyEntries = weeklyEntries.filter(w => w.id !== id);
  saveWeeklyEntries();
  navigate('weekly');
}

// ================================================================
// CELEBRATION
// ================================================================
function showCelebration(hits) {
  document.getElementById('celebrationHits').innerHTML =
    hits.map(h => `<div style="margin:3px 0">🏆 ${h}</div>`).join('');
  document.getElementById('celebrationOverlay').style.display = 'flex';
  launchConfetti();
  // Auto-dismiss after 6 s
  setTimeout(dismissCelebration, 6000);
}
function dismissCelebration() {
  document.getElementById('celebrationOverlay').style.display = 'none';
  document.getElementById('confettiContainer').innerHTML = '';
}
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  const colors = ['#1B3A6B','#1D9E75','#BA7517','#E05252','#4CAF50','#FFD700'];
  for (let i = 0; i < 70; i++) {
    const p = document.createElement('div');
    const size = 5 + Math.random() * 7;
    p.style.cssText = [
      `position:absolute`,
      `width:${size}px`,
      `height:${size}px`,
      `background:${colors[Math.floor(Math.random() * colors.length)]}`,
      `border-radius:${Math.random() > .5 ? '50%' : '2px'}`,
      `left:${Math.random() * 100}%`,
      `top:-10px`,
      `animation:confettiFall ${1.4 + Math.random() * 2}s ease-in ${Math.random() * .7}s forwards`,
    ].join(';');
    container.appendChild(p);
  }
}

// AUTH
// ================================================================
function doSignIn() {
  document.getElementById('authError').textContent   = '';
  document.getElementById('signInBtn').style.display = 'none';
  document.getElementById('authLoading').style.display = 'flex';
  auth.signInWithPopup(provider).catch(err => {
    document.getElementById('authError').textContent     = 'Sign-in failed: ' + err.message;
    document.getElementById('signInBtn').style.display   = 'flex';
    document.getElementById('authLoading').style.display = 'none';
  });
}

function doSignOut() {
  auth.signOut();
}

// ================================================================
// USER ACCESS CONTROL — FIRESTORE HELPERS
// ================================================================

// Fetch the current user's permissions doc from Firestore.
// Returns the data object or null if the user is not in the system.
async function fetchUserRecord(email) {
  const doc = await db.collection(FS_USERS).doc(email).get();
  return doc.exists ? doc.data() : null;
}

// Called on first-ever sign-in by the owner when the users collection is empty.
// Seeds both initial user documents so the system is ready for the second user.
async function bootstrapUsersIfNeeded() {
  const snap = await db.collection(FS_USERS).limit(1).get();
  if (!snap.empty) return; // already seeded
  const batch = db.batch();
  batch.set(db.collection(FS_USERS).doc('eslam.elbana@gmail.com'), {
    email: 'eslam.elbana@gmail.com',
    pages: [...ALL_PAGES],
    role:  'Owner',
  });
  batch.set(db.collection(FS_USERS).doc('doctormetwally84@gmail.com'), {
    email: 'doctormetwally84@gmail.com',
    pages: [...ALL_PAGES],
    role:  'Full Access',
  });
  await batch.commit();
}

// ── Admin panel helpers (owner only) ─────────────────────────────

let _adminUsers = []; // cached list for the admin panel

async function loadAdminUsers() {
  const snap = await db.collection(FS_USERS).get();
  _adminUsers = snap.docs.map(d => d.data());
  _adminUsers.sort((a,b) => a.email.localeCompare(b.email));
  renderAdminUserList();
}

function renderAdminUserList() {
  const el = document.getElementById('adminUserList');
  if (!el) return;
  if (!_adminUsers.length) {
    el.innerHTML = '<p class="text-sm text-light">No users found.</p>';
    return;
  }
  el.innerHTML = _adminUsers.map(u => {
    const pageChips = ALL_PAGES.map(pg => {
      const has = u.pages.includes(pg);
      return `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;margin:2px;background:${has?'var(--navy)':'#e5e7eb'};color:${has?'#fff':'var(--light)'}">${pg}</span>`;
    }).join('');
    const isOwner = u.email === OWNER_EMAIL;
    return `
      <div style="border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px">
          <div>
            <div style="font-weight:700;font-size:0.9rem;color:var(--navy)">${u.email}</div>
            <div style="font-size:0.75rem;color:var(--light);margin-top:2px">${u.role || 'Custom'}</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" style="font-size:0.75rem;padding:4px 12px" onclick="openEditUser('${u.email}')">Edit</button>
            ${isOwner ? '' : `<button class="btn btn-danger" style="font-size:0.75rem;padding:4px 12px" onclick="removeUser('${u.email}')">Remove</button>`}
          </div>
        </div>
        <div>${pageChips}</div>
      </div>`;
  }).join('');
}

function openEditUser(email) {
  const u = _adminUsers.find(x => x.email === email);
  if (!u) return;
  const el = document.getElementById('adminUserList');
  // Replace the user's row with an inline edit form
  const existing = el.querySelectorAll('[data-edit-email]');
  existing.forEach(e => e.remove()); // close any open edit
  const checkboxes = ALL_PAGES.map(pg => `
    <label style="display:flex;align-items:center;gap:6px;font-size:0.85rem;cursor:pointer;padding:4px 0">
      <input type="checkbox" value="${pg}" ${u.pages.includes(pg)?'checked':''}
        ${u.email===OWNER_EMAIL && pg==='Settings' ? 'disabled checked' : ''}>
      ${pg}
    </label>`).join('');
  const form = document.createElement('div');
  form.setAttribute('data-edit-email', email);
  form.style.cssText = 'border:2px solid var(--navy);border-radius:10px;padding:16px;margin-bottom:10px';
  form.innerHTML = `
    <div style="font-weight:700;font-size:0.88rem;color:var(--navy);margin-bottom:12px">Edit access — ${email}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;margin-bottom:14px">${checkboxes}</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" style="font-size:0.8rem" onclick="saveEditUser('${email}')">Save</button>
      <button class="btn btn-ghost"   style="font-size:0.8rem" onclick="loadAdminUsers()">Cancel</button>
    </div>`;
  el.insertBefore(form, el.firstChild);
}

async function saveEditUser(email) {
  const form = document.querySelector(`[data-edit-email="${email}"]`);
  if (!form) return;
  const checked = [...form.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
  if (!checked.length) { alert('User must have at least one page.'); return; }
  await db.collection(FS_USERS).doc(email).update({ pages: checked });
  await loadAdminUsers();
}

async function removeUser(email) {
  if (email === OWNER_EMAIL) return;
  if (!confirm(`Remove ${email}?\n\nThey will lose access immediately on next page load.`)) return;
  await db.collection(FS_USERS).doc(email).delete();
  await loadAdminUsers();
}

function openAddUserForm() {
  const el = document.getElementById('addUserForm');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveNewUser() {
  const emailEl = document.getElementById('newUserEmail');
  const email   = (emailEl.value || '').trim().toLowerCase();
  if (!email || !email.includes('@')) { alert('Enter a valid email address.'); return; }
  if (_adminUsers.find(u => u.email === email)) { alert('This user already exists.'); return; }
  const checked = [...document.querySelectorAll('#newUserPageChecks input:checked')].map(c => c.value);
  if (!checked.length) { alert('Select at least one page.'); return; }
  await db.collection(FS_USERS).doc(email).set({
    email,
    pages: checked,
    role:  'Custom',
  });
  emailEl.value = '';
  document.querySelectorAll('#newUserPageChecks input').forEach(c => c.checked = false);
  document.getElementById('addUserForm').style.display = 'none';
  await loadAdminUsers();
}

// ================================================================
// INIT (auth-gated)
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  // Show gate immediately; auth listener will hide it once signed in
  document.getElementById('authGate').style.display = 'flex';

  auth.onAuthStateChanged(async user => {
    if (!user) {
      // Not signed in — reset state and show gate
      userRecord = null;
      document.getElementById('mainNav').innerHTML            = '';
      document.getElementById('authGate').style.display      = 'flex';
      document.getElementById('signInBtn').style.display     = 'flex';
      document.getElementById('authLoading').style.display   = 'none';
      document.getElementById('signOutBtn').style.display    = 'none';
      document.getElementById('userDisplay').textContent     = '';
      return;
    }

    document.getElementById('authLoading').style.display = 'flex';
    document.getElementById('signInBtn').style.display   = 'none';

    // ── 10-second watchdog — never spin forever ───────────────────
    let _timedOut = false;
    const _watchdog = setTimeout(() => {
      _timedOut = true;
      console.error('[Auth] Load timed out after 10 s');
      document.getElementById('authError').textContent     = 'Loading timed out. Please refresh the page and try again.';
      document.getElementById('signInBtn').style.display   = 'flex';
      document.getElementById('authLoading').style.display = 'none';
    }, 10000);

    try {
      console.log('[Auth] Signed in as:', user.email);

      // ── Owner bypass ─────────────────────────────────────────────
      // Hardcoded owner email gets full access immediately without
      // waiting on the users/ collection (avoids chicken-and-egg on
      // first run before Firestore rules are published).
      if (user.email === OWNER_EMAIL) {
        console.log('[Auth] Owner — granting full access directly');
        userRecord = { email: user.email, pages: [...ALL_PAGES], role: 'Owner' };
        // Seed the users collection in the background — non-blocking
        bootstrapUsersIfNeeded().catch(e => console.warn('[Bootstrap] skipped:', e.message));
      } else {
        // Non-owner: must exist in the users/ collection
        console.log('[Auth] Fetching user record from Firestore...');
        const rec = await fetchUserRecord(user.email);
        console.log('[Auth] User record:', rec);
        if (!rec) {
          clearTimeout(_watchdog);
          await auth.signOut();
          document.getElementById('authError').textContent     = 'Access denied. Contact the pharmacy owner to request access.';
          document.getElementById('signInBtn').style.display   = 'flex';
          document.getElementById('authLoading').style.display = 'none';
          return;
        }
        userRecord = rec;
      }

      // Load app data
      console.log('[Auth] Loading app data...');
      await loadState();
      console.log('[Auth] App data loaded.');

    } catch (err) {
      clearTimeout(_watchdog);
      console.error('[Auth] Error during load:', err);
      document.getElementById('authError').textContent     = 'Error loading data: ' + err.message;
      document.getElementById('signInBtn').style.display   = 'flex';
      document.getElementById('authLoading').style.display = 'none';
      return;
    }

    if (_timedOut) return; // watchdog already handled the UI
    clearTimeout(_watchdog);

    // Update header
    document.getElementById('userDisplay').textContent  = user.displayName || user.email;
    document.getElementById('signOutBtn').style.display = 'block';

    // Build nav from user's page permissions
    renderNav();

    // Hide gate, show app — land on first allowed page
    document.getElementById('authGate').style.display = 'none';
    const firstPage = PAGE_MAP.find(p => userRecord.pages.includes(p.name));
    navigate(firstPage ? firstPage.id : 'dashboard');
  });
});
</script>
